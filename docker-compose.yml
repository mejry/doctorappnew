version: '3.9'

services:
  # Backend services – each builds its own Docker image
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    environment:
      - PORT=4000
    depends_on:
      - mongo

  patient-service:
    build:
      context: ./services/patient-service
      dockerfile: Dockerfile
    environment:
      - PORT=8005
    depends_on:
      - mongo

  consultation-service:
    build:
      context: ./services/consultation-service
      dockerfile: Dockerfile
    environment:
      - PORT=8003
    depends_on:
      - mongo

  prescription-service:
    build:
      context: ./services/prescription-service
      dockerfile: Dockerfile
    environment:
      - PORT=8004
    depends_on:
      - mongo

  appointment-service:
    build:
      context: ./services/appointment-service
      dockerfile: Dockerfile
    environment:
      - PORT=3001
    depends_on:
      - mongo

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    environment:
      - GATEWAY_PORT=8090
      - GATEWAY_ADMIN_PORT=9878
    depends_on:
      - auth-service
      - patient-service
      - consultation-service
      - prescription-service
      - appointment-service

  # Frontend – build Flutter web and serve via Nginx (frontend Dockerfile)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - PORT=3000

  # Nginx reverse proxy – expose only port 80 to the host
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api-gateway
      - auth-service
      - frontend

  mongo:
    image: mongo:6.0
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"

volumes:
  mongo-data:
