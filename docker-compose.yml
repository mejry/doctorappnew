services:
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    environment:
      - PORT=4000
      - MONGO_URI=mongodb://mongo:27017/auth-service
    depends_on:
      - mongo

  patient-service:
    build:
      context: ./services/patient-service
      dockerfile: Dockerfile
    environment:
      - PORT=8005
      - MONGO_URI=mongodb://mongo:27017/patient-service
    depends_on:
      - mongo

  consultation-service:
    build:
      context: ./services/consultation-service
      dockerfile: Dockerfile
    environment:
      - PORT=8003
      - MONGO_URI=mongodb://mongo:27017/consultation-service
    depends_on:
      - mongo

  prescription-service:
    build:
      context: ./services/prescription-service
      dockerfile: Dockerfile
    environment:
      - PORT=8004
      - MONGODB_URI=mongodb://mongo:27017/prescription-service
    depends_on:
      - mongo

  appointment-service:
    build:
      context: ./services/appointment-service
      dockerfile: Dockerfile
    environment:
      - PORT=3001
      - MONGO_URI=mongodb://mongo:27017/appointment-service
    depends_on:
      - mongo

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    ports:
      - "8090:8090"
    environment:
      - GATEWAY_PORT=8090
      - GATEWAY_ADMIN_PORT=9878
    depends_on:
      - auth-service
      - patient-service
      - consultation-service
      - prescription-service
      - appointment-service

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - PORT=3000

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - api-gateway
      - auth-service
      - frontend

  mongo:
    image: mongo:6.0
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"

volumes:
  mongo-data:
