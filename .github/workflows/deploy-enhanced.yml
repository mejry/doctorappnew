name: Doctor App Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-only:
    name: Validate project without VPS deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check project structure
        run: |
          test -d frontend
          test -d services
          test -d nginx
          test -f docker-compose.yml

      - name: Validate Docker Compose
        run: docker compose -f docker-compose.yml config

      - name: Pipeline success
        run: echo "Pipeline completed successfully. No VPS deploy, SCP, SSH, or push step was executed."
