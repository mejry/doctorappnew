# gateway.config.yml - VERSION CORRIGÉE COMPLÈTE
http:
  port: 8090

admin:
  port: 9878
  host: localhost

apiEndpoints:
  auth:
    paths: ['/api/auth', '/api/auth/*']
    methods: ['GET', 'POST', 'PUT', 'DELETE', 'OPTIONS']
  users:
    paths: ['/api/users', '/api/users/*']
    methods: ['GET', 'POST', 'PUT', 'DELETE', 'OPTIONS']
  roles:
    paths: ['/api/roles', '/api/roles/*']
    methods: ['GET', 'POST', 'PUT', 'DELETE', 'OPTIONS']
  patients:
    paths: ['/api/patients', '/api/patients/*']
    methods: ['GET', 'POST', 'PUT', 'DELETE', 'OPTIONS']
  consultations:
    paths: ['/api/consultations', '/api/consultations/*']
    methods: ['GET', 'POST', 'PUT', 'DELETE', 'OPTIONS']
  prescriptions:
    paths: ['/api/prescriptions', '/api/prescriptions/*']
    methods: ['GET', 'POST', 'PUT', 'DELETE', 'OPTIONS']
  medications:
    paths: ['/api/medications', '/api/medications/*']
    methods: ['GET', 'POST', 'PUT', 'DELETE', 'OPTIONS']
  appointments:
    paths: ['/api/appointments', '/api/appointments/*']
    methods: ['GET', 'POST', 'PUT', 'DELETE', 'OPTIONS']
  waitingroom:
    paths: ['/api/waiting-room', '/api/waiting-room/*']
    methods: ['GET', 'POST', 'PUT', 'DELETE', 'OPTIONS']

serviceEndpoints:
  auth:
    url: 'http://auth-service:4000'
  patients:
    url: 'http://patient-service:8005'
  consultations:
    url: 'http://consultation-service:8003'
  prescriptions:
    url: 'http://prescription-service:8004'
  appointments:
    url: 'http://appointment-service:3001'

policies:
  - basic-auth
  - cors
  - expression
  - key-auth
  - log
  - oauth2
  - proxy
  - jwt
  - rate-limit
  - rewrite

pipelines:
  authPipeline:
    apiEndpoints:
      - auth
      - users
      - roles
    policies:
      - cors:
          - action:
              origin: 'http://localhost:3000'
              credentials: true
              methods: 'GET,HEAD,PUT,PATCH,POST,DELETE,OPTIONS'
              allowedHeaders: 'Content-Type,Authorization'
      - proxy:
          - action:
              serviceEndpoint: auth
              changeOrigin: true
  patientsPipeline:
    apiEndpoints:
      - patients
    policies:
      - cors:
          - action:
              origin: 'http://localhost:3000'
              credentials: true
              methods: 'GET,HEAD,PUT,PATCH,POST,DELETE,OPTIONS'
              allowedHeaders: 'Content-Type,Authorization'
      - proxy:
          - action:
              serviceEndpoint: patients
              changeOrigin: true
  consultationsPipeline:
    apiEndpoints:
      - consultations
    policies:
      - cors:
          - action:
              origin: 'http://localhost:3000'
              credentials: true
              methods: 'GET,HEAD,PUT,PATCH,POST,DELETE,OPTIONS'
              allowedHeaders: 'Content-Type,Authorization'
      - proxy:
          - action:
              serviceEndpoint: consultations
              changeOrigin: true
  prescriptionsPipeline:
    apiEndpoints:
      - prescriptions
      - medications
    policies:
      - cors:
          - action:
              origin: 'http://localhost:3000'
              credentials: true
              methods: 'GET,HEAD,PUT,PATCH,POST,DELETE,OPTIONS'
              allowedHeaders: 'Content-Type,Authorization'
      - proxy:
          - action:
              serviceEndpoint: prescriptions
              changeOrigin: true
  appointmentsPipeline:
    apiEndpoints:
      - appointments
      - waitingroom
    policies:
      - cors:
          - action:
              origin: 'http://localhost:3000'
              credentials: true
              methods: 'GET,HEAD,PUT,PATCH,POST,DELETE,OPTIONS'
              allowedHeaders: 'Content-Type,Authorization'
      - proxy:
          - action:
              serviceEndpoint: appointments
              changeOrigin: true
